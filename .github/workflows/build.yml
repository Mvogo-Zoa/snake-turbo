name: Build Snake Turbo Windows

on:
  push:
    branches: [ master ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer dependances
        run: pip install pygame pyinstaller

      - name: Compiler exe
        run: pyinstaller --onefile --noconsole flappy.py

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: FlappyBird
          path: dist/flappy.exe
